<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Powflow · World Cup 2026 — bản đồ nhân quả</title>
<meta name="description" content="Bản đồ nhân quả World Cup 2026 — mỗi kết quả là một mắt xích, không chỉ một tỉ số. Dữ liệu mở bởi Causari." />
<meta property="og:title" content="Powflow · World Cup 2026" />
<meta property="og:description" content="Bản đồ nhân quả World Cup 2026 — nhìn là hiểu, không phải đọc." />
<meta property="og:type" content="website" />
<style>
  :root{
    --ink:#070b12; --ink-soft:#0e141f; --card:#121a27; --line:#1e2a3d;
    --fg:#e8eef7; --muted:#8aa0bd; --accent:#00f2ff;
    --done:#22d3a0; --sched:#f0b43a;
    --r-caused:#ff5470; --r-enabled:#4aa8ff; --r-accelerated:#22d3a0;
    --r-inspired:#a78bfa; --r-delayed:#f0b43a; --r-prevented:#7c8aa0;
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--ink);color:var(--fg);font-family:var(--font);-webkit-font-smoothing:antialiased;overflow:hidden}
  a{color:var(--accent);text-decoration:none}
  .app{display:flex;flex-direction:column;height:100dvh}
  header{flex:0 0 auto;background:linear-gradient(var(--ink),rgba(7,11,18,.9));border-bottom:1px solid var(--line)}
  .hd{padding:10px 16px;display:flex;align-items:center;gap:10px}
  .brand{font-weight:800;letter-spacing:.4px;font-size:16px;display:flex;align-items:center;gap:8px;white-space:nowrap}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent)}
  .brand small{color:var(--muted);font-weight:700;letter-spacing:.16em;text-transform:uppercase;font-size:9.5px}
  .spacer{flex:1}
  .updated{color:var(--muted);font-size:11px;white-space:nowrap}
  .lang{display:inline-flex;border:1px solid var(--line);border-radius:999px;overflow:hidden}
  .lang button{background:transparent;color:var(--muted);border:0;padding:5px 10px;font-size:12px;font-weight:700;cursor:pointer}
  .lang button[aria-pressed="true"]{background:var(--accent);color:#04121a}
  .subbar{padding:0 16px 9px;display:flex;gap:14px;align-items:center;flex-wrap:wrap}
  .subbar .t{color:var(--muted);font-size:12.5px}
  .legend{display:flex;gap:11px;flex-wrap:wrap;font-size:11px;color:var(--muted)}
  .legend i{font-style:normal;display:inline-flex;align-items:center;gap:5px}
  .swatch{width:14px;height:3px;border-radius:2px;display:inline-block}
  .pip{width:9px;height:9px;border-radius:50%;display:inline-block}
  .stage{flex:1 1 auto;position:relative;overflow:auto;-webkit-overflow-scrolling:touch}
  svg{display:block}
  .node{cursor:pointer}
  .node rect{transition:filter .15s}
  .node:hover rect,.node.sel rect{filter:brightness(1.3)}
  .node.sel rect{stroke:var(--accent);stroke-width:2.5}
  .ncode{font-size:11px;font-weight:800;fill:var(--muted)}
  .ncode.won{fill:#eaf6ff}
  .nscore{font-size:14px;font-weight:900;fill:#fff;letter-spacing:.3px}
  .nvs{font-size:10px;font-weight:700;fill:var(--sched)}
  .daylabel{font-size:11px;font-weight:800;fill:var(--muted);letter-spacing:.03em}
  .daytick{stroke:var(--line);stroke-width:1;opacity:.5}
  .grouplink{cursor:pointer}
  .grouplink:focus{outline:none}
  .grouplink:hover .grouplab,.grouplink:focus .grouplab{fill:var(--accent)}
  .grouplink:hover .groupfocus,.grouplink:focus .groupfocus{stroke:var(--accent);opacity:.55}
  .grouplab{font-size:11px;font-weight:800;fill:var(--muted);letter-spacing:.05em}
  .groupfocus{fill:transparent;stroke:var(--accent);stroke-width:1;opacity:0;pointer-events:all}
  .groupbars rect{fill:var(--muted);opacity:.8}
  .grouplink:hover .groupbars rect,.grouplink:focus .groupbars rect{fill:var(--accent);opacity:1}
  .grouprow{fill:#0c1320;opacity:.45}
  .nowline{stroke:var(--accent);stroke-width:1.5;stroke-dasharray:3 4;opacity:.8}
  .nowlab{font-size:10px;font-weight:800;fill:var(--accent);letter-spacing:.12em}
  .edge{fill:none;opacity:.35;transition:opacity .15s}
  .edge.dim{opacity:.07}
  .edge.hot{opacity:1}
  .drawer{position:fixed;left:0;right:0;bottom:0;z-index:30;background:var(--card);border-top:1px solid var(--line);border-radius:16px 16px 0 0;padding:16px 18px 22px;transform:translateY(110%);transition:transform .22s ease;max-height:60dvh;overflow:auto;box-shadow:0 -16px 40px rgba(0,0,0,.5)}
  .drawer.open{transform:translateY(0)}
  .drawer .x{position:absolute;right:14px;top:12px;background:var(--ink-soft);border:1px solid var(--line);color:var(--muted);border-radius:8px;width:30px;height:30px;font-size:16px;cursor:pointer}
  .chip{display:inline-block;font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;padding:3px 9px;border-radius:999px;border:1px solid var(--line)}
  .chip.done{color:var(--done);border-color:#15402f;background:#0c241b}
  .chip.scheduled{color:var(--sched);border-color:#40340f;background:#241c08}
  .drawer h3{margin:8px 0 6px;font-size:19px;padding-right:34px}
  .why{margin:0 0 12px;color:#cdd9ea;font-size:14px}
  .ents{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px}
  .ent{font-size:11px;color:var(--muted);background:var(--ink-soft);border:1px solid var(--line);border-radius:6px;padding:2px 8px}
  .lk{font-size:13px;margin:9px 0;border-left:2px solid var(--line);padding-left:10px}
  .lk b{font-weight:800}
  .lk .ev{display:block;color:var(--muted);font-size:12px;margin-top:2px}
  .conf{color:var(--muted);font-size:11px;font-variant-numeric:tabular-nums}
  .watch{margin-top:10px;font-size:12.5px;color:var(--muted)}
  .watch b{color:#cdd9ea}
  .sectlabel{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin:14px 0 4px}
  .standings{position:fixed;z-index:24;min-width:258px;max-width:calc(100vw - 24px);background:rgba(18,26,39,.98);border:1px solid var(--line);border-radius:10px;padding:10px;box-shadow:0 14px 36px rgba(0,0,0,.48)}
  .standings[hidden]{display:none}
  .standings .top{display:flex;align-items:center;gap:8px;margin-bottom:7px}
  .standings h3{margin:0;font-size:13px;letter-spacing:.02em}
  .standings .close{margin-left:auto;width:25px;height:25px;border:1px solid var(--line);border-radius:7px;background:var(--ink-soft);color:var(--muted);cursor:pointer;font-size:15px;line-height:1}
  .standings table{width:100%;border-collapse:collapse;font-size:11.5px;font-variant-numeric:tabular-nums}
  .standings th{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.06em;font-weight:800;border-bottom:1px solid var(--line);padding:4px 3px;text-align:right}
  .standings th:first-child,.standings td:first-child{text-align:left}
  .standings td{padding:5px 3px;border-bottom:1px solid rgba(30,42,61,.58);text-align:right}
  .standings tr:last-child td{border-bottom:0}
  .standings .tm{display:flex;align-items:center;gap:7px;min-width:0}
  .standings .tm b{color:#eaf6ff;font-size:11px;min-width:26px}
  .standings .tm span{color:#cdd9ea;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:112px}
  .standings .pts{color:var(--accent);font-weight:900}
  .err{position:absolute;left:50%;top:40%;transform:translate(-50%,-50%);background:#240b10;border:1px solid #401520;color:#ffd5dd;border-radius:12px;padding:14px 18px;text-align:center}
  .foot{flex:0 0 auto;border-top:1px solid var(--line);padding:6px 16px;color:var(--muted);font-size:11px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  @media (max-width:560px){ .subbar .t{display:none} }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="hd">
      <div class="brand"><span class="dot"></span> Powflow <small>World Cup 2026</small></div>
      <span class="spacer"></span>
      <div class="updated" id="updated"></div>
      <div class="lang" role="group" aria-label="Language">
        <button data-lang="vi" aria-pressed="true">VI</button>
        <button data-lang="en" aria-pressed="false">EN</button>
      </div>
    </div>
    <div class="subbar">
      <span class="t" data-i="sub"></span>
      <span class="spacer"></span>
      <span class="legend">
        <i><span class="pip" style="background:var(--done)"></span> <span data-i="lg_done"></span></i>
        <i><span class="pip" style="background:var(--sched)"></span> <span data-i="lg_sched"></span></i>
        <span id="rellegend" class="legend"></span>
      </span>
    </div>
  </header>

  <div class="stage" id="stage"></div>

  <div class="foot">
    <span data-i="foot"></span>
    <span class="spacer"></span>
    <a href="https://github.com/causari/causari-data" target="_blank" rel="noopener">causari-data</a>
    <span>· CC-BY-SA 4.0</span>
  </div>
</div>

<div class="drawer" id="drawer" aria-hidden="true">
  <button class="x" id="drawerClose" aria-label="close">×</button>
  <div id="drawerBody"></div>
</div>
<div class="standings" id="standings" hidden role="dialog" aria-modal="false"></div>

<script>
// ── Powflow World Cup 2026 — visual causal canvas ───────────────────────────
// Rows = groups, columns = days. Each match is a node (FIFA codes + score),
// causal links are drawn edges. Heavy text opens in a tap drawer. Live data.
const BASE = '../packs/worldcup-2026';
const FALLBACK = 'https://raw.githubusercontent.com/causari/causari-data/main/packs/worldcup-2026';
const REFRESH_MS = 5 * 60 * 1000;

const CODE = {
  'Algeria':'ALG','Argentina':'ARG','Australia':'AUS','Austria':'AUT','Belgium':'BEL','Bosnia & Herzegovina':'BIH',
  'Brazil':'BRA','Canada':'CAN','Cape Verde':'CPV','Colombia':'COL','Croatia':'CRO','Curaçao':'CUW',
  'Czech Republic':'CZE','DR Congo':'COD','Ecuador':'ECU','Egypt':'EGY','England':'ENG','France':'FRA',
  'Germany':'GER','Ghana':'GHA','Haiti':'HAI','Iran':'IRN','Iraq':'IRQ','Ivory Coast':'CIV','Japan':'JPN',
  'Jordan':'JOR','Mexico':'MEX','Morocco':'MAR','Netherlands':'NED','New Zealand':'NZL','Norway':'NOR',
  'Panama':'PAN','Paraguay':'PAR','Portugal':'POR','Qatar':'QAT','Saudi Arabia':'KSA','Scotland':'SCO',
  'Senegal':'SEN','South Africa':'RSA','South Korea':'KOR','Spain':'ESP','Sweden':'SWE','Switzerland':'SUI',
  'Tunisia':'TUN','Turkey':'TUR','USA':'USA','Uruguay':'URU','Uzbekistan':'UZB'
};
const code = n => {
  if(CODE[n]) return CODE[n];
  const s=String(n||'');
  if(/^[0-9]/.test(s)) return s.split('/')[0].toUpperCase();   // knockout placeholder e.g. "2A", "3A/B/C"
  if(/^[WL]\d/i.test(s)) return s.toUpperCase();               // "W73" / "L73"
  return s.replace(/[^A-Za-z]/g,'').slice(0,3).toUpperCase() || '?';
};
const LANE_ORDER = l => { const m=/^Group ([A-L])$/.exec(l); if(m) return m[1].charCodeAt(0)-65;
  return ({'Round of 32':12,'Round of 16':13,'Quarter-final':14,'Semi-final':15,'Match for third place':16,'Final':17})[l] ?? 99; };
const laneLabel = l => { const m=/^Group ([A-L])$/.exec(l); if(m) return (lang==='vi'?'Bảng ':'Group ')+m[1];
  const ko={'Round of 32':['Vòng 1/16','Round of 32'],'Round of 16':['Vòng 1/8','Round of 16'],'Quarter-final':['Tứ kết','Quarter-final'],'Semi-final':['Bán kết','Semi-final'],'Match for third place':['Tranh hạng 3','Third place'],'Final':['Chung kết','Final']};
  return ko[l]?ko[l][lang==='vi'?0:1]:l; };

const I18N = {
  vi:{ sub:'Mỗi trận là một mắt xích — chạm vào node để xem vì sao nó đổi cục diện.',
    lg_done:'Đã đấu', lg_sched:'Sắp đấu', lg_link:'nhân quả', foot:'Dữ liệu nhân quả mở · cập nhật theo ngày.',
    updated:t=>'Cập nhật: '+t, now:'HÔM NAY', err:'Không tải được dữ liệu. Thử lại sau giây lát.',
    rel:{caused:'gây ra',enabled:'mở đường cho',accelerated:'thúc đẩy',inspired:'truyền cảm hứng',delayed:'trì hoãn',prevented:'ngăn cản'},
    st:{completed:'Đã đấu',scheduled:'Sắp đấu',live:'Đang đấu',forecast:'Dự báo'},
    leads:'Dẫn tới', from:'Bắt nguồn từ', watch:'Đáng xem tiếp', conf:'tin', grp:g=>'Bảng '+g,
    standings:'Bảng xếp hạng', noStandings:'Chưa có dữ liệu bảng' },
  en:{ sub:'Each match is a link — tap a node to see why it shifts the race.',
    lg_done:'Played', lg_sched:'Upcoming', lg_link:'causal', foot:'Open causal data · updated daily.',
    updated:t=>'Updated: '+t, now:'TODAY', err:'Could not load data. Please try again shortly.',
    rel:{caused:'caused',enabled:'enabled',accelerated:'accelerated',inspired:'inspired',delayed:'delayed',prevented:'prevented'},
    st:{completed:'Played',scheduled:'Upcoming',live:'Live',forecast:'Forecast'},
    leads:'Leads to', from:'Comes from', watch:'Watch next', conf:'conf', grp:g=>'Group '+g,
    standings:'Standings', noStandings:'No group data yet' }
};
let lang = (navigator.language||'vi').startsWith('en') ? 'en' : 'vi';
let DATA=null, NODES=null, selId=null, standingsGroup=null;

const $=(s,r=document)=>r.querySelector(s);
const esc=s=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

async function load(){
  for(const base of [BASE,FALLBACK]){
    try{
      const [events,links,insights]=await Promise.all([
        fetch(`${base}/events.json`,{cache:'no-store'}).then(r=>{if(!r.ok)throw 0;return r.json();}),
        fetch(`${base}/links.json`,{cache:'no-store'}).then(r=>r.ok?r.json():[]),
        fetch(`${base}/insights.json`,{cache:'no-store'}).then(r=>r.ok?r.json():[]),
      ]);
      DATA={events,links,insights};return true;
    }catch(e){}
  }
  return false;
}

const teams = ev => (ev.entities||[]).filter(e=>!/group/i.test(e));
const groupOf = ev => { const es=ev.entities||[]; return es.find(e=>/^(Group [A-L]$|Round of|Quarter|Semi|Final$|Match for)/.test(e)) || es[2] || '—'; };
const score = ev => { if((ev.status||'completed')!=='completed') return null; const m=String(`${ev.title||''} ${ev.description||''}`).match(/(^|[^\d-])(\d{1,2})\s*[-–]\s*(\d{1,2})(?![\d-])/); return m?m[2]+'–'+m[3]:null; };
const scoreParts = ev => { const m=String(score(ev)||'').match(/(\d{1,2})\D+(\d{1,2})/); return m?[Number(m[1]),Number(m[2])]:null; };
const isGroupLane = g => /^Group [A-L]$/.test(g);

function standingsFor(group){
  if(!DATA || !isGroupLane(group)) return [];
  const rows=new Map();
  const ensure=team=>{ if(!rows.has(team)) rows.set(team,{team,p:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,pts:0}); return rows.get(team); };
  DATA.events.filter(ev=>groupOf(ev)===group).forEach(ev=>{
    const [a,b]=teams(ev);
    if(a) ensure(a); if(b) ensure(b);
    const sc=scoreParts(ev);
    if(!a || !b || !sc) return;
    const ra=ensure(a), rb=ensure(b), [ga,gb]=sc;
    ra.p++; rb.p++; ra.gf+=ga; ra.ga+=gb; rb.gf+=gb; rb.ga+=ga; ra.gd=ra.gf-ra.ga; rb.gd=rb.gf-rb.ga;
    if(ga>gb){ ra.w++; rb.l++; ra.pts+=3; }
    else if(gb>ga){ rb.w++; ra.l++; rb.pts+=3; }
    else { ra.d++; rb.d++; ra.pts++; rb.pts++; }
  });
  return [...rows.values()].sort((a,b)=>b.pts-a.pts || b.gd-a.gd || b.gf-a.gf || a.team.localeCompare(b.team));
}

function applyStatic(){
  const t=I18N[lang]; document.documentElement.lang=lang;
  document.querySelectorAll('[data-i]').forEach(el=>{const v=t[el.getAttribute('data-i')];if(typeof v==='string')el.textContent=v;});
  document.querySelectorAll('.lang button').forEach(b=>b.setAttribute('aria-pressed',String(b.dataset.lang===lang)));
}

// ── layout: rows = groups, columns = dates. Rows grow if a group has two ────
// matches on the same day, so nothing is ever hidden behind another node. ────
function layout(){
  const evs=[...DATA.events].sort((a,b)=>String(a.date||a.yearNum).localeCompare(String(b.date||b.yearNum)));
  const dates=[...new Set(evs.map(e=>e.date||e.yearLabel))];
  const groups=[...new Set(evs.map(groupOf))].sort((a,b)=>LANE_ORDER(a)-LANE_ORDER(b));
  const COLW=132, NW=112, NH=42, TOP=44, GUT=58, PADY=10, STACK=NH+8, ROWPAD=20;
  const maxStack={};
  for(const g of groups){
    const counts={};
    evs.filter(e=>groupOf(e)===g).forEach(e=>{const d=e.date||e.yearLabel;counts[d]=(counts[d]||0)+1;});
    maxStack[g]=Math.max(1,...Object.values(counts));
  }
  const rowH={}, rowY={}; let cy=TOP+PADY;
  for(const g of groups){ rowH[g]=NH+ROWPAD+(maxStack[g]-1)*STACK; rowY[g]=cy; cy+=rowH[g]; }
  const subLane={};
  const nodes=evs.map(ev=>{
    const g=groupOf(ev), col=dates.indexOf(ev.date||ev.yearLabel);
    const k=g+'|'+(ev.date||ev.yearLabel); const s=(subLane[k]=(subLane[k]||0)); subLane[k]++;
    const x=GUT+col*COLW+COLW/2;
    const y=rowY[g]+rowH[g]/2 - ((maxStack[g]-1)*STACK)/2 + s*STACK;
    return {ev,x,y,col,group:g,teamA:teams(ev)[0]||'',teamB:teams(ev)[1]||'',score:score(ev),
      label:ev.dateLabel||ev.yearLabel};
  });
  const doneDates=evs.filter(e=>(e.status||'completed')==='completed').map(e=>e.date);
  const lastDone=doneDates.sort().slice(-1)[0];
  const nowCol=lastDone?dates.indexOf(lastDone):-1;
  const W=GUT+dates.length*COLW+20, H=cy+PADY;
  return {nodes,dates,groups,rowH,rowY,W,H,COLW,NW,NH,TOP,GUT,nowCol};
}

const edgePath=(a,b,NW)=>{const x1=a.x+NW/2,y1=a.y,x2=b.x-NW/2,y2=b.y,dx=Math.max(34,(x2-x1)/2);return `M${x1},${y1} C${x1+dx},${y1} ${x2-dx},${y2} ${x2},${y2}`;};

function render(){
  const t=I18N[lang], stage=$('#stage');
  if(!DATA){ stage.innerHTML=''; return; }
  if(!DATA.events.length){ stage.innerHTML=`<div class="err">${esc(t.err)}</div>`; return; }
  const L=layout(); NODES=L;
  const byId=Object.fromEntries(L.nodes.map(n=>[n.ev.id,n]));
  const lastDone=[...DATA.events].filter(e=>e.status==='completed').sort((a,b)=>String(a.date).localeCompare(String(b.date))).slice(-1)[0];
  $('#updated').textContent=t.updated(lastDone?.dateLabel||'—');
  const H=Math.max(L.H, stage.clientHeight-2);

  // group row bands (scroll with content) + sticky left labels (pinned)
  let rows='';
  let glabels=`<rect x="0" y="0" width="${L.GUT}" height="${H}" fill="#070b12"/><line x1="${L.GUT}" y1="0" x2="${L.GUT}" y2="${H}" stroke="var(--line)" stroke-width="1"/>`;
  L.groups.forEach((g,i)=>{
    const y=L.rowY[g], h=L.rowH[g], gcol=`hsl(${(i*53)%360},55%,64%)`;
    if(i%2===0) rows+=`<rect class="grouprow" x="0" y="${y}" width="${L.W}" height="${h}"/>`;
    const canStand=isGroupLane(g), label=laneLabel(g);
    glabels+=`<g class="${canStand?'grouplink':''}" data-group="${esc(g)}" ${canStand?`role="button" tabindex="0" aria-label="${esc(t.standings+': '+label)}"`:''}>
      <rect class="groupfocus" x="5" y="${y+h/2-15}" width="${L.GUT-10}" height="30" rx="7"/>
      <rect x="0" y="${y+4}" width="3" height="${h-8}" rx="1.5" fill="${gcol}" opacity="0.85"/>
      <text class="grouplab" x="11" y="${y+h/2+4}" fill="${gcol}">${esc(label)}</text>
      ${canStand?`<g class="groupbars" transform="translate(${L.GUT-13},${y+h/2-7})"><rect x="0" y="8" width="2" height="5" rx="1"/><rect x="4" y="4" width="2" height="9" rx="1"/><rect x="8" y="0" width="2" height="13" rx="1"/></g>`:''}
    </g>`;
  });

  // day ticks + labels
  let ticks='';
  L.dates.forEach((d,i)=>{
    const x=L.GUT+i*L.COLW+L.COLW/2;
    const n=L.nodes.find(n=>n.col===i);
    ticks+=`<line class="daytick" x1="${x}" y1="${L.TOP}" x2="${x}" y2="${H}"/>
      <text class="daylabel" x="${x}" y="${L.TOP-14}" text-anchor="middle">${esc(n?n.label:d)}</text>`;
  });

  // now marker
  let now='';
  if(L.nowCol>=0){
    const x=L.GUT+L.nowCol*L.COLW+L.COLW;
    now=`<line class="nowline" x1="${x}" y1="${L.TOP-2}" x2="${x}" y2="${H}"/>
      <text class="nowlab" x="${x+5}" y="${L.TOP+13}">${esc(t.now)}</text>`;
  }

  // edges
  let edges='';
  const cssVar=v=>getComputedStyle(document.documentElement).getPropertyValue(v).trim();
  DATA.links.forEach(l=>{
    const a=byId[l.fromEvent],b=byId[l.toEvent]; if(!a||!b) return;
    const col=cssVar('--r-'+l.relationship)||'#4aa8ff';
    const w=1+Math.round((l.confidence||0.6)*3);
    edges+=`<path class="edge" data-from="${esc(l.fromEvent)}" data-to="${esc(l.toEvent)}" d="${edgePath(a,b,L.NW)}" stroke="${col}" stroke-width="${w}" marker-end="url(#arr)"/>`;
  });
  const rels=[...new Set(DATA.links.map(l=>l.relationship))];
  const rl=$('#rellegend'); if(rl) rl.innerHTML=rels.map(r=>`<i><span class="swatch" style="background:var(--r-${r})"></span> ${esc(t.rel[r]||r)}</i>`).join('');

  // nodes
  let nodes='';
  L.nodes.forEach(n=>{
    const st=n.ev.status||'completed';
    const sched=st!=='completed';
    const fill=sched?'#221c10':'#13233a'; const stroke=sched?'#f0b43a':'#22d3a0';
    const x=n.x-L.NW/2, y=n.y-L.NH/2;
    let wa=false,wb=false; if(n.score){const p=n.score.split('–').map(Number); wa=p[0]>p[1]; wb=p[1]>p[0];}
    const inner = n.score
      ? `<text class="ncode${wa?' won':''}" x="${n.x-L.NW/2+12}" y="${n.y+4}" text-anchor="start">${esc(code(n.teamA))}</text>
         <text class="nscore" x="${n.x}" y="${n.y+5}" text-anchor="middle">${esc(n.score)}</text>
         <text class="ncode${wb?' won':''}" x="${n.x+L.NW/2-12}" y="${n.y+4}" text-anchor="end">${esc(code(n.teamB))}</text>`
      : `<text class="ncode" x="${n.x-14}" y="${n.y+4}" text-anchor="end">${esc(code(n.teamA))}</text>
         <text class="nvs" x="${n.x}" y="${n.y+4}" text-anchor="middle">–</text>
         <text class="ncode" x="${n.x+14}" y="${n.y+4}" text-anchor="start">${esc(code(n.teamB))}</text>`;
    nodes+=`<g class="node" data-id="${esc(n.ev.id)}" tabindex="0">
      <rect x="${x}" y="${y}" width="${L.NW}" height="${L.NH}" rx="10" fill="${fill}" stroke="${stroke}" stroke-width="1.2" ${sched?'stroke-dasharray="4 3"':''}/>
      ${inner}
    </g>`;
  });

  const prevScroll=stage.scrollLeft;
  stage.innerHTML=`<svg width="${L.W}" height="${H}" viewBox="0 0 ${L.W} ${H}" xmlns="http://www.w3.org/2000/svg">
    <defs><marker id="arr" markerWidth="7" markerHeight="7" refX="6" refY="3.2" orient="auto"><path d="M0,0 L7,3.2 L0,6.4 Z" fill="#6f86a6"/></marker></defs>
    <g>${rows}</g><g>${ticks}</g>${now}<g>${edges}</g><g>${nodes}</g>
    <g class="glabels" id="glabels">${glabels}</g>
  </svg>`;

  stage.querySelectorAll('.node').forEach(g=>{
    g.addEventListener('click',()=>select(g.dataset.id));
    g.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();select(g.dataset.id);}});
  });
  stage.querySelectorAll('.grouplink').forEach(g=>{
    g.addEventListener('click',e=>{e.stopPropagation();openStandings(g.dataset.group,e);});
    g.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();openStandings(g.dataset.group,e);}});
  });
  // Keep group labels pinned to the left as the timeline scrolls horizontally.
  const gl=document.getElementById('glabels');
  const pin=()=>{ if(gl) gl.setAttribute('transform','translate('+stage.scrollLeft+',0)'); };
  stage.onscroll=pin;
  // On first paint scroll to the "now" region; afterwards preserve scroll across refreshes.
  if(!window.__scrolled && L.nowCol>=0){
    const nowX=L.GUT+L.nowCol*L.COLW+L.COLW;
    stage.scrollLeft=Math.max(0, nowX - stage.clientWidth*0.62);
    window.__scrolled=true;
  } else { stage.scrollLeft=prevScroll; }
  pin();
  if(selId) highlight(selId);
}

function closeStandings(){
  standingsGroup=null;
  const pop=$('#standings');
  if(pop){ pop.hidden=true; pop.innerHTML=''; }
}

function openStandings(group,e){
  if(!isGroupLane(group)) return;
  const rows=standingsFor(group), t=I18N[lang], pop=$('#standings');
  standingsGroup=group;
  $('#drawer').classList.remove('open'); $('#drawer').setAttribute('aria-hidden','true');
  selId=null; highlight('__none__');
  const body=rows.length ? `<table aria-label="${esc(t.standings)}">
    <thead><tr><th></th><th>P</th><th>W</th><th>D</th><th>L</th><th>GD</th><th>Pts</th></tr></thead>
    <tbody>${rows.map(r=>`<tr>
      <td><span class="tm"><b>${esc(code(r.team))}</b><span>${esc(r.team)}</span></span></td>
      <td>${r.p}</td><td>${r.w}</td><td>${r.d}</td><td>${r.l}</td><td>${r.gd>0?'+'+r.gd:r.gd}</td><td class="pts">${r.pts}</td>
    </tr>`).join('')}</tbody>
  </table>` : `<div class="conf">${esc(t.noStandings)}</div>`;
  pop.innerHTML=`<div class="top"><h3>${esc(t.standings)} · ${esc(laneLabel(group))}</h3><button class="close" type="button" aria-label="close">×</button></div>${body}`;
  pop.hidden=false;
  pop.querySelector('.close').addEventListener('click',closeStandings);
  const r=e?.currentTarget?.getBoundingClientRect?.() || {left:12,right:70,top:86,bottom:116};
  let x=r.right+8, y=r.top-8;
  if(window.innerWidth<=560){ x=12; y=r.bottom+8; }
  x=Math.max(12,Math.min(x,window.innerWidth-pop.offsetWidth-12));
  y=Math.max(12,Math.min(y,window.innerHeight-pop.offsetHeight-12));
  pop.style.left=x+'px'; pop.style.top=y+'px';
}

function highlight(id){
  document.querySelectorAll('.node').forEach(g=>g.classList.toggle('sel',g.dataset.id===id));
  const any=document.querySelector('.node.sel');
  document.querySelectorAll('.edge').forEach(p=>{
    const on=p.dataset.from===id||p.dataset.to===id;
    p.classList.toggle('hot',!!any&&on); p.classList.toggle('dim',!!any&&!on);
  });
}

function select(id){
  closeStandings();
  selId=id; highlight(id);
  const t=I18N[lang]; const ev=DATA.events.find(e=>e.id===id); if(!ev) return;
  const st=ev.status||'completed'; const cls=st==='completed'?'done':'scheduled';
  const outs=DATA.links.filter(l=>l.fromEvent===id), ins=DATA.links.filter(l=>l.toEvent===id);
  const byId=Object.fromEntries(DATA.events.map(e=>[e.id,e]));
  const lk=(l,dir)=>{const other=byId[dir==='out'?l.toEvent:l.fromEvent];const col=`var(--r-${l.relationship})`;
    return `<div class="lk" style="border-color:${col}"><b style="color:${col}">${esc(t.rel[l.relationship]||l.relationship)}</b> → ${esc(other?other.title:'?')}
      <span class="conf"> · ${t.conf} ${Math.round((l.confidence||0)*100)}%</span><span class="ev">${esc(l.evidence||'')}</span></div>`;};
  let body=`<span class="chip ${cls}">${esc(t.st[st]||st)}</span> <span class="conf">${esc(ev.dateLabel||'')}</span>
    <h3>${esc(ev.title)}</h3><p class="why">${esc(ev.whyItMatters||ev.description||'')}</p>
    <div class="ents">${(ev.entities||[]).map(e=>`<span class="ent">${esc(e)}</span>`).join('')}</div>`;
  if(outs.length) body+=`<div class="sectlabel">${esc(t.leads)}</div>${outs.map(l=>lk(l,'out')).join('')}`;
  if(ins.length) body+=`<div class="sectlabel">${esc(t.from)}</div>${ins.map(l=>lk(l,'in')).join('')}`;
  if((ev.nextWatchpoints||[]).length) body+=`<div class="watch"><b>${esc(t.watch)}:</b> ${ev.nextWatchpoints.map(esc).join(' · ')}</div>`;
  $('#drawerBody').innerHTML=body;
  $('#drawer').classList.add('open'); $('#drawer').setAttribute('aria-hidden','false');
}
function closeDrawer(){ $('#drawer').classList.remove('open'); selId=null; highlight('__none__'); }
$('#drawerClose').addEventListener('click',closeDrawer);

$('#standings').addEventListener('click',e=>e.stopPropagation());
document.addEventListener('click',e=>{ if(standingsGroup && !e.target.closest('#standings')) closeStandings(); });
window.addEventListener('keydown',e=>{ if(e.key==='Escape') closeStandings(); });

function setLang(l){ lang=l; closeStandings(); applyStatic(); render(); if(selId)select(selId); }
document.querySelectorAll('.lang button').forEach(b=>b.addEventListener('click',()=>setLang(b.dataset.lang)));

async function boot(){ applyStatic(); const ok=await load(); if(!ok){$('#stage').innerHTML=`<div class="err">${esc(I18N[lang].err)}</div>`;return;} render(); }
boot();
setInterval(async()=>{ if(await load()) render(); }, REFRESH_MS);
window.addEventListener('resize',()=>{ closeStandings(); if(DATA) render(); });
</script>
</body>
</html>
