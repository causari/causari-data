name: pages

# Serve the pack data via GitHub Pages, gated on validation.
# The deploy job `needs: validate`, so a bad commit (dangling link, broken schema)
# fails validation and the deploy is SKIPPED — the live visual keeps serving the
# last-good data instead of publishing a broken graph.

on:
  push:
    branches: [main]
    paths:
      - "packs/**"
      - "data/**"
      - "schema/**"
      - "scripts/validate-pack.mjs"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Validate all packs (gate)
        run: node scripts/validate-pack.mjs

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Stage data for Pages
        run: |
          mkdir -p _site
          # Copy only the data dirs that exist (data/ may not be present yet).
          for d in packs data schema; do [ -d "$d" ] && cp -r "$d" _site/; done
          printf '%s' '{"note":"Causari open data - JSON served for live consumers","packs":["worldcup-2026"]}' > _site/index.json
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
